<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Voice AI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 500px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 15px;
        }

        p {
            color: #64748b;
            margin-bottom: 30px;
        }

        .upload-box {
            border: 2px dashed #6366f1;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 25px;
            background: #eef2ff;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #3730a3;
            transform: translateY(-2px);
        }

        .icon {
            font-size: 45px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🎙️</div>

    <h1>Voice AI Converter</h1>
    <p>Audio yuklang va uni sun’iy ovozga aylantiring</p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="upload-box">
            <input type="file" name="audio" accept=".mp3,.wav" required>
        </div>

        <button type="submit">Yuklash</button>
    </form>
</div>

</body>
</html>
